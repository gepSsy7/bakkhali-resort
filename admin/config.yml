backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - file: "data.json"
        label: "General"
        name: "general"
        fields:
          - {label: "Site Name", name: "site_name", widget: "string"}
          - {label: "Hero Title", name: "hero_title", widget: "string"}
          - {label: "Hero Subtitle", name: "hero_subtitle", widget: "text"}
          - {label: "High Tide Time (e.g., 14:20)", name: "tide_time", widget: "string"}
          - {label: "Ferry Wait (e.g., ~10 min)", name: "ferry_wait", widget: "string"}
          - {label: "Contact Phone", name: "contact_phone", widget: "string", required: false}
          - {label: "Contact Email", name: "contact_email", widget: "string", required: false}
          - { label: "OpenWeather API Key", name: "weather_api_key", widget: "string", required: false }
          - label: "Rooms"
            name: "rooms"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Price (INR)", name: "price", widget: "number", value_type: "int"}
              - {label: "Image", name: "image", widget: "image", required: false}
          - label: "Menu Highlights"
            name: "menu_highlights"
            widget: "list"
            fields:
              - {label: "Dish Name", name: "name", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
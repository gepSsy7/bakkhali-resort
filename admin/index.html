<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager | Bakkhali Resort</title>

  <!-- Netlify Identity Widget - load early -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- This div is where the CMS React app mounts -->
  <div id="nc-root"></div>

  <!-- Decap CMS script -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // Wait for DOM and CMS to be ready
    document.addEventListener('DOMContentLoaded', function() {
      // Initialize Netlify Identity
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function(user) {
          if (!user) {
            window.netlifyIdentity.on("login", function() {
              document.location.href = "/admin/";
            });
          }
        });
        window.netlifyIdentity.init();
      }

      // Only register preview styles if CMS object exists
      if (typeof CMS !== 'undefined') {
        CMS.registerPreviewStyle("/css/style.css");
      }
    });
  </script>
</body>
</html>
